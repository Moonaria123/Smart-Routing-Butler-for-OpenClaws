# 仓库级 CI：Router Python 严格类型检查与 lint（ISSUE-PL-11）
name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

jobs:
  proxy-quality:
    name: Proxy (type-check + lint)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: proxy
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: proxy/package-lock.json
      - run: npm ci
      - run: npm run type-check
      - run: npm run lint

  dashboard-quality:
    name: Dashboard (type-check + lint)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashboard
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: dashboard/package-lock.json
      - run: npm ci
      - run: npm run type-check
      - run: npm run lint

  router-quality:
    name: Router (ruff + mypy --strict)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: router
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            router/requirements.txt
            router/requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Ruff
        run: python -m ruff check app/

      - name: Mypy (strict)
        run: python -m mypy app/ --strict

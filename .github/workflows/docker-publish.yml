# 在 push 到 main 时构建多架构镜像并推送到 GHCR，标签固定为 latest（个人账号命名空间 = repository_owner）
name: Docker Publish

on:
  push:
    branches: [main]

concurrency:
  group: docker-publish-main
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - context: proxy
            image: smartrouter-proxy
          - context: router
            image: smartrouter-router
          - context: dashboard
            image: smartrouter-dashboard
    steps:
      - uses: actions/checkout@v4

      - name: 将 GitHub Owner 转为小写（GHCR 要求）
        run: echo "IMAGE_OWNER=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_ENV"

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 构建并推送 ${{ matrix.image }}:latest
        uses: docker/build-push-action@v6
        with:
          context: ./${{ matrix.context }}
          file: ./${{ matrix.context }}/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ghcr.io/${{ env.IMAGE_OWNER }}/${{ matrix.image }}:latest
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,scope=${{ matrix.image }},mode=max
